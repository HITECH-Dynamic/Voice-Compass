experiment: exp059

inputs:
  train_manifest: data/afrivoices/manifests/manifest_train.parquet
  dev_manifest: data/afrivoices/manifests/manifest_dev.parquet
  test_manifest: data/afrivoices/manifests/manifest_test.parquet
  anv_audio_index: data/afrivoices/indexes/anv_audio_index.parquet
  swahili_tar_index: data/afrivoices/indexes/swahili_tar_index.parquet

filters:
  languages:
    - kik
    - kln
    - luo
    - mas
    - som
    - swa
  source_splits:
    - train
  speech_types:
    - scripted
    - spontaneous
  require_transcription: true
  min_duration_seconds: 0.25
  max_duration_seconds: 30

sampling:
  strategy: shard_aware
  max_rows_per_language: 600
  eval_fraction: 0.1667
  random_seed: 42

outputs:
  train: data/processed/exp059_train.parquet
  eval: data/processed/exp059_eval.parquet
  summary: reports/dataset_analysis/exp059_dataset_summary.csv

evaluation:
  report_global_wer: true
  report_per_language_wer: true
  report_kaggle_average_wer: true
  language_order:
    - swa
    - kik
    - luo
    - som
    - mas
    - kln
